<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380" font-family="'Segoe UI','Yu Gothic UI',sans-serif">
  <rect width="820" height="380" fill="#ffffff" rx="8"/>
  <text x="410" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">境界値テスト結果: zipfldr.dll vs Expand-Archive vs tar.exe</text>
  <!-- Y axis labels -->
  <text x="85" y="87" text-anchor="end" font-size="12" fill="#333">258 bytes</text>
  <text x="85" y="137" text-anchor="end" font-size="12" fill="#333">259 bytes</text>
  <text x="85" y="187" text-anchor="end" font-size="12" font-weight="bold" fill="#c62828">260 bytes</text>
  <text x="85" y="237" text-anchor="end" font-size="12" fill="#333">261 bytes</text>
  <text x="85" y="287" text-anchor="end" font-size="12" fill="#333">262 bytes</text>
  <!-- Column headers -->
  <text x="240" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">zipfldr.dll</text>
  <text x="240" y="73" text-anchor="middle" font-size="10" fill="#888">(エクスプローラー)</text>
  <text x="460" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">Expand-Archive</text>
  <text x="460" y="73" text-anchor="middle" font-size="10" fill="#888">(.NET / PowerShell)</text>
  <text x="670" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">tar.exe</text>
  <text x="670" y="73" text-anchor="middle" font-size="10" fill="#888">(libarchive)</text>
  <!-- Grid lines -->
  <line x1="100" y1="95" x2="780" y2="95" stroke="#eee" stroke-width="1"/>
  <line x1="100" y1="145" x2="780" y2="145" stroke="#eee" stroke-width="1"/>
  <line x1="100" y1="195" x2="780" y2="195" stroke="#ffcdd2" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="100" y1="245" x2="780" y2="245" stroke="#eee" stroke-width="1"/>
  <line x1="100" y1="295" x2="780" y2="295" stroke="#eee" stroke-width="1"/>
  <!-- 260 threshold indicator -->
  <rect x="90" y="173" width="700" height="44" rx="4" fill="#fff8e1" fill-opacity="0.5"/>
  <text x="795" y="192" text-anchor="end" font-size="10" font-weight="bold" fill="#e65100">← MAX_PATH</text>
  <!-- zipfldr.dll column -->
  <!-- 258 OK -->
