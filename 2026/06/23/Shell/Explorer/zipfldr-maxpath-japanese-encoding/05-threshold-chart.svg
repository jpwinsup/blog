  <text x="240" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
  <!-- 259 OK -->
  <rect x="170" y="128" width="140" height="26" rx="13" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="240" y="146" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
  <!-- 260 FAILED -->
  <rect x="170" y="178" width="140" height="26" rx="13" fill="#ffebee" stroke="#c62828" stroke-width="2.5"/>
  <text x="240" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">❌ FAILED</text>
  <!-- 261 FAILED -->
  <rect x="170" y="228" width="140" height="26" rx="13" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="240" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">❌ FAILED</text>
  <!-- 262 FAILED -->
  <rect x="170" y="278" width="140" height="26" rx="13" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="240" y="296" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">❌ FAILED</text>
  <!-- Expand-Archive column -->
  <!-- 258 OK -->
  <rect x="390" y="78" width="140" height="26" rx="13" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="460" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
  <!-- 259 OK -->
  <rect x="390" y="128" width="140" height="26" rx="13" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="460" y="146" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
  <!-- 260 OK -->
  <rect x="390" y="178" width="140" height="26" rx="13" fill="#e8f5e9" stroke="#43a047" stroke-width="2.5"/>
  <text x="460" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
  <!-- 261 OK -->
  <rect x="390" y="228" width="140" height="26" rx="13" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="460" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
  <!-- 262 OK -->
  <rect x="390" y="278" width="140" height="26" rx="13" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="460" y="296" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
  <!-- tar.exe column -->
  <!-- 258 OK -->
  <rect x="600" y="78" width="140" height="26" rx="13" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="670" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
  <!-- 259 OK -->
  <rect x="600" y="128" width="140" height="26" rx="13" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="670" y="146" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
  <!-- 260 OK (different from zipfldr!) -->
  <rect x="600" y="178" width="140" height="26" rx="13" fill="#e8f5e9" stroke="#43a047" stroke-width="2.5"/>
  <text x="670" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">✅ OK</text>
