  <!-- Bottom summary -->
  <rect x="100" y="320" width="620" height="45" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="410" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">zipfldr.dll だけが 260 バイト以上でエラーになる</text>
  <text x="410" y="358" text-anchor="middle" font-size="11" fill="#bf360c">.NET (Expand-Archive) と libarchive (tar.exe) は LongPath API 対応のため制限なし</text>
