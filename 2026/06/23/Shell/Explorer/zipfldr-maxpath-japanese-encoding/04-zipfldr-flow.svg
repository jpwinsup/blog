<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480" font-family="'Segoe UI','Yu Gothic UI',sans-serif">
  <defs>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555"/></marker>
  </defs>
  <rect width="820" height="480" fill="#ffffff" rx="8"/>
  <text x="410" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">zipfldr.dll のパス長チェックの流れ</text>
  <!-- Step 1: Read ZIP -->
  <rect x="290" y="55" width="240" height="45" rx="22" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2"/>
  <text x="410" y="83" text-anchor="middle" font-size="13" fill="#1565c0">ZIP ファイルを開く</text>
  <line x1="410" y1="100" x2="410" y2="125" stroke="#555" stroke-width="2" marker-end="url(#arrowB)"/>
  <!-- Step 2: Read entries -->
  <rect x="260" y="130" width="300" height="45" rx="8" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="2"/>
  <text x="410" y="158" text-anchor="middle" font-size="13" fill="#283593">各エントリの Local File Header を読み取る</text>
  <line x1="410" y1="175" x2="410" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrowB)"/>
  <!-- Step 3: Get filename bytes -->
  <rect x="230" y="205" width="360" height="45" rx="8" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="2"/>
  <text x="410" y="233" text-anchor="middle" font-size="13" fill="#283593">ファイル名フィールドのバイト長 (n) を取得</text>
  <line x1="410" y1="250" x2="410" y2="280" stroke="#555" stroke-width="2" marker-end="url(#arrowB)"/>
  <!-- Decision diamond -->
  <polygon points="410,285 540,330 410,375 280,330" fill="#fff3e0" stroke="#ff9800" stroke-width="2.5"/>
  <text x="410" y="326" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">n &gt;= 260 ?</text>
  <text x="410" y="345" text-anchor="middle" font-size="11" fill="#bf360c">(MAX_PATH)</text>
  <!-- Yes branch (right) -->
  <line x1="540" y1="330" x2="640" y2="330" stroke="#c62828" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <text x="585" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Yes</text>
  <rect x="650" y="305" width="140" height="50" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2.5"/>
  <text x="720" y="327" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">ZIP 全体を</text>
  <text x="720" y="346" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">「無効」と判定 ❌</text>
  <!-- No branch (down) -->
  <line x1="410" y1="375" x2="410" y2="405" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <text x="425" y="395" font-size="12" font-weight="bold" fill="#2e7d32">No</text>
  <rect x="310" y="410" width="200" height="45" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2.5"/>
  <text x="410" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">正常に展開 ✅</text>
  <!-- Side notes -->
  <rect x="30" y="280" width="220" height="95" rx="8" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
  <text x="40" y="300" font-size="11" font-weight="bold" fill="#555">チェック対象:</text>
  <text x="40" y="318" font-size="11" fill="#666">• ZIP 内の相対パス (エントリ名)</text>
  <text x="40" y="336" font-size="11" fill="#666">• 展開先の絶対パスではない</text>
  <text x="40" y="354" font-size="11" fill="#666">• 文字数ではなく生バイト長</text>
  <text x="40" y="372" font-size="11" fill="#c62828">• LongPathsEnabled の影響なし</text>
</svg>